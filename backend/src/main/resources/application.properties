# Application Configuration
spring.application.name=socialmedia-api
server.port=8080

# Active Profile
# Use 'h2' for local development (no external DB needed)
# Use 'postgres' for production / Docker
spring.profiles.active=${SPRING_PROFILE:h2}

# Common JPA Configuration
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=${JWT_SECRET:4d6a4f3849336e566f6d4e4e6c487a67786e6b765a62684c3342546648667343}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:2592000000}

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.root=WARN
logging.level.com.socialmedia=INFO
logging.level.org.springframework.security=WARN

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# App
app.name=SocialMediaClone
app.version=1.0.0
app.max-posts-per-page=20
