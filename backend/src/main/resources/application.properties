# ── Active profile ────────────────────────────────────────────
spring.profiles.active=postgres

# ── Server ────────────────────────────────────────────────────
server.port=9090

# ── JWT ───────────────────────────────────────────────────────
# 64-char hex string = 256-bit key  (change in production!)
jwt.secret=404e635266556a586e3272357538782f413f4428472b4b6250645367566b5970
jwt.expiration-ms=86400000

# ── Rate limiting ─────────────────────────────────────────────
app.ratelimit.enabled=true
app.ratelimit.requests-per-minute=120

# ── Media / File upload ───────────────────────────────────────
app.media.upload-dir=uploads
app.media.base-url=/api/v1/media/files

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# ─────────────────────────────────────────────────────────────
# Profile: postgres
# Required env vars:
#   DB_HOST     (default: localhost)
#   DB_PORT     (default: 5432)
#   DB_NAME     (default: socialmedia)
#   DB_USER     (default: postgres)
#   DB_PASSWORD (default: postgres)
# ─────────────────────────────────────────────────────────────

# ── Datasource ────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:socialmedia}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ── Connection pool (HikariCP) ────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────────────────────
# 'validate' — Flyway owns the schema; Hibernate only validates it
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── Flyway ────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# ── H2 console – disabled ─────────────────────────────────────
spring.h2.console.enabled=false
