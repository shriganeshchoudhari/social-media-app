# ── Test datasource (H2 in-memory – always reset between test runs) ──────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# ── JWT (short-lived key for tests) ──────────────────────────
jwt.secret=74657374536563726574746573745365637265747465737453656372657474657374
jwt.expiration-ms=3600000

# ── Disable async so notification events run in same thread ──
spring.task.execution.pool.core-size=1
spring.task.execution.pool.max-size=1

# ── Disable rate limiting in tests ─────────────────────────
app.ratelimit.enabled=false

# ── Disable Flyway in tests (H2 create-drop handles schema) ──
spring.flyway.enabled=false
