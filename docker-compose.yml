version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Local development stack for ConnectHub
#
# Usage:
#   docker compose up -d          # start postgres (and optionally pgAdmin)
#   docker compose down -v        # stop and wipe volumes
#
# Then run the backend with:
#   cd backend
#   DB_PASSWORD=secret mvn spring-boot:run -Dspring-boot.run.profiles=postgres
# ─────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    container_name: connecthub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       socialmedia
      POSTGRES_USER:     socialmedia
      POSTGRES_PASSWORD: secret          # change for real deployments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialmedia -d socialmedia"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional pgAdmin UI – comment out if not needed
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: connecthub-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@connecthub.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
